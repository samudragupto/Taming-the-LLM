name: AI Agent Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run linter
        run: ruff check src/ tests/ pytest_semantic/

      - name: Check formatting
        run: ruff format --check src/ tests/ pytest_semantic/

      - name: Run type checker
        run: mypy src/ pytest_semantic/

  test-fast:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run fast tests
        run: pytest tests/ -v -m "not slow and not integration" --tb=short

  test-integration:
    runs-on: ubuntu-latest
    needs: test-fast
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run integration tests
        run: pytest tests/ -v -m "integration and not slow" --tb=short

  test-semantic:
    runs-on: ubuntu-latest
    needs: test-fast
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache sentence-transformers model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-all-MiniLM-L6-v2

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run semantic tests
        run: pytest tests/ -v -m "semantic" --semantic-threshold=0.7 --tb=short

  coverage:
    runs-on: ubuntu-latest
    needs: [test-integration, test-semantic]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache sentence-transformers model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-all-MiniLM-L6-v2

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run full test suite with coverage
        run: |
          pytest tests/ \
            --cov=src \
            --cov=pytest_semantic \
            --cov-report=xml \
            --cov-report=term-missing \
            --semantic-threshold=0.7 \
            -v --tb=short

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml